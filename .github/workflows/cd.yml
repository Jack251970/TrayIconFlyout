name: TrayIconFlyout CD

on:
  workflow_dispatch:

env:
  WORKING_DIR:         '${{ github.workspace }}' # 'D:\a\TrayIconFlyout\TrayIconFlyout'
  WASDK_APP_PROJ_PATH: '${{ github.workspace }}\src\TrayIconFlyout.Wasdk\TrayIconFlyout.Wasdk.csproj'
  UWP_APP_PROJ_PATH:   '${{ github.workspace }}\src\TrayIconFlyout.Uwp\TrayIconFlyout.Uwp.csproj'
  OUTPUT_DIR:          '${{ github.workspace }}\artifacts'

jobs:
  build-pack-publish:
    runs-on: windows-2025-vs2026
    env:
      CONFIGURATION: 'Release'
      PLATFORM: 'x64'

    steps:
    - name: Checkout the repository
      uses: actions/checkout@v6
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v3
    - name: Setup NuGet
      uses: NuGet/setup-nuget@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: |
          9.0.x
          10.0.x

    - name: Pack the project (WASDK)
      run: dotnet build $env:WASDK_APP_PROJ_PATH -c $env:CONFIGURATION -a $env:PLATFORM -o $env:OUTPUT_DIR

    - name: Pack the project (UWP)
      run: dotnet build $env:UWP_APP_PROJ_PATH   -c $env:CONFIGURATION -a $env:PLATFORM -o $env:OUTPUT_DIR

    - name: Upload nupkg artifacts
      uses: actions/upload-artifact@v4
      with:
        name: NuPkg artifacts
        path: |
          ${{ env.OUTPUT_DIR }}\*.nupkg
          ${{ env.OUTPUT_DIR }}\*.snupkg

    - name: Publish to NuGet.org
      run: |
        dotnet nuget push ${{ env.OUTPUT_DIR }}\**\*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json  --skip-duplicate
        dotnet nuget push ${{ env.OUTPUT_DIR }}\**\*.snupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
